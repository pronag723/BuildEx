name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail loudly if the Supabase secrets weren't wired into the build.
      # Without them the deployed site bakes empty strings into the JS bundle,
      # auth shows "isn't configured", and the failure is silent at deploy
      # time. Most common cause: secrets added as Environment secrets instead
      # of Repository secrets (this `build` job has no `environment:` field
      # so it can only see Repository secrets).
      - name: Verify Supabase secrets are available
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL is empty. Add it under Settings -> Secrets and variables -> Actions -> Repository secrets (NOT Environment secrets)."
            missing=1
          else
            echo "NEXT_PUBLIC_SUPABASE_URL is set (length=${#NEXT_PUBLIC_SUPABASE_URL})"
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY is empty. Add it under Settings -> Secrets and variables -> Actions -> Repository secrets (NOT Environment secrets)."
            missing=1
          else
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is set (length=${#NEXT_PUBLIC_SUPABASE_ANON_KEY})"
          fi
          exit $missing

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Payments stay dormant (mock checkout) unless this repo VARIABLE is
          # "true". Set it under Settings -> Secrets and variables -> Actions ->
          # Variables to flip the real NOWPayments flow on. Not a secret — it is
          # baked into the public bundle either way; absent ⇒ empty ⇒ off.
          NEXT_PUBLIC_PAYMENTS_ENABLED: ${{ vars.NEXT_PUBLIC_PAYMENTS_ENABLED }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
